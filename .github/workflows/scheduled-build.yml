name: Trigger Cloudflare Pages Build

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-trigger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare deploy hook
        env:
          CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK" ]; then
            echo "Missing required secret: CLOUDFLARE_DEPLOY_HOOK" >&2
            exit 1
          fi
          curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK"
